{% extends "base.html" %}
{% block content %}

<div class="page">

<div class="image-box">
<img src="/static/images/otp.png">
</div>

<div class="form-box">
<h2>OTP Verification</h2>

<!-- ✅ MESSAGE DISPLAY -->
{% if message %}
<p class="msg">{{ message }}</p>
{% endif %}

<form method="POST">
<input name="otp" placeholder="Enter OTP">
<button>Verify</button>
</form>

</div>

</div>

{% endblock %}

<!DOCTYPE html>
<html>
<head>
    <title>AI Customer Support Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <!-- LEFT PANEL -->
    <div class="sidebar">
        <h2>Support Areas</h2>

        <button onclick="selectDomain('account')">Account & Login</button>
        <button onclick="selectDomain('payment')">Payments & Billing</button>
        <button onclick="selectDomain('orders')">Orders & Services</button>
        <button onclick="selectDomain('support')">Support & Contact</button>
        <button onclick="selectDomain('company')">Company & Policies</button>

        <div id="domain-queries" class="queries">
            <p>Select a category to see example queries.</p>
        </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="chat-area">
        <div class="header">🤖 AI Customer Support Chatbot</div>

        <div id="chat-box" class="chat-box">
            <p><b>Bot:</b> Hello! Please select a category and ask your question.</p>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your question..." />
            <button id="send-btn">Send</button>
        </div>
    </div>

</div>

<script>
let selectedDomain = "";

const domainQueries = {
    account: [
        "create account",
        "forgot password",
        "reset password",
        "login issues",
        "update profile"
    ],
    payment: [
        "refund policy",
        "payment failed",
        "invoice details",
        "payment methods"
    ],
    orders: [
        "order status",
        "cancel order",
        "delivery time"
    ],
    support: [
        "contact support",
        "support number",
        "working hours",
        "raise complaint"
    ],
    company: [
        "about company",
        "privacy policy",
        "terms and conditions"
    ]
};

function selectDomain(domain) {
    selectedDomain = domain;
    let html = "<h4>Example Queries</h4><ul>";
    domainQueries[domain].forEach(q => html += "<li>" + q + "</li>");
    html += "</ul>";
    document.getElementById("domain-queries").innerHTML = html;
}

document.getElementById("send-btn").addEventListener("click", sendMessage);
document.getElementById("user-input").addEventListener("keypress", e => {
    if (e.key === "Enter") sendMessage();
});

function sendMessage() {
    const input = document.getElementById("user-input");
    const message = input.value.trim();
    if (!message) return;

    appendMessage("You", message);

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ message: message, domain: selectedDomain })
    })
    .then(res => res.json())
    .then(data => appendMessage("Bot", data.response));

    input.value = "";
}

function appendMessage(sender, text) {
    const chat = document.getElementById("chat-box");
    const p = document.createElement("p");
    p.innerHTML = `<b>${sender}:</b> ${text}`;
    chat.appendChild(p);
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
